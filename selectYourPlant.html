<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Selecciona tu Planta</title>
    <link rel="stylesheet" href="src/styles/style-base.css">
    <link rel="stylesheet" href="src/styles/style-menu.css">
</head>
<body>

    <main class="menu-container">
        <div class="slider-wrapper">

            <button class="carousel-btn prev" onclick="cambiarSlide(-1)" aria-label="Anterior">
                <img src="assets/buttons/left_arrow.png" alt="Anterior">
            </button>

            <div class="planta-box">
                <ul id="slides">
                    <li><img src="assets/plants/plantsC/plant1.png" alt="Planta 1"></li>
                    <li><img src="assets/plants/plantsC/plant2.png" alt="Planta 2"></li>
                    <li><img src="assets/plants/plantsC/plant3.png" alt="Planta 3"></li>
                </ul>
            </div>

            <button class="carousel-btn next" onclick="cambiarSlide(1)" aria-label="Siguiente">
                <img src="assets/buttons/right_arrow.png" alt="Siguiente">
            </button>

        </div>
    </main>

    <div class="bottom-bar">
        <button onclick="seleccionarPlanta()" class="select-btn">
            <img src="assets/buttons/next_btn.png" alt="Seleccionar Planta">
        </button>
    </div>

    <script>
        (function () {
            const slides = document.querySelectorAll('#slides li');
            let slideIndex = 0;
            let intervalId = null;

        const plantas = [
            {
                key: 'plant1',
                body: 'assets/plants/plantsC/plant1.png',      // menú
                gameBody: 'assets/plants/plant1.png' // juego
            },
            {
                key: 'plant2',
                body: 'assets/plants/plantsC/plant2.png',
                gameBody: 'assets/plants/plant2.png'
            },
            {
                key: 'plant3',
                body: 'assets/plants/plantsC/plant3.png',
                gameBody: 'assets/plants/plant3.png'
            }
        ];


            window.seleccionarPlanta = function () {
                const plantaElegida = plantas[slideIndex];
                localStorage.setItem('plantaSeleccionada', JSON.stringify(plantaElegida));
                window.location.href = 'game.html';
            };

            function showSlide(i) {
                slideIndex = (i + slides.length) % slides.length;
                slides.forEach(s => s.style.display = 'none');
                slides[slideIndex].style.display = 'flex';
            }

            window.cambiarSlide = function (n) {
                showSlide(slideIndex + (n > 0 ? 1 : -1));
                resetAuto();
            };

            function startAuto() { intervalId = setInterval(() => showSlide(slideIndex + 1), 5000); }
            function resetAuto() { clearInterval(intervalId); startAuto(); }

            window.addEventListener('load', () => {
                if (slides.length === 0) return;
                showSlide(0);
                startAuto();
            });

            window.addEventListener('beforeunload', () => clearInterval(intervalId));
        })();
    </script>

</body>
</html>
