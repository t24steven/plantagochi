<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantagochi</title>
    <link rel="stylesheet" href="src/styles/style-base.css">
    <link rel="stylesheet" href="src/styles/style-menu.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 15px 20px 30px; /* ← reducido */
        }

        /* ── TÍTULO ── */
        .title {
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
            flex-shrink: 0;
        }

        .title img {
            width: clamp(350px, 55vw, 750px); /* ← más grande */
            object-fit: contain;
        }

        /* ── PLANTA CENTRAL ── */
        .plant-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0; /* ← sin padding extra */
        }

        .plant-container img {
            max-height: 50vh; /* ← un poco más pequeña para dar espacio */
            max-width: 70vw;
            object-fit: contain;
            filter: drop-shadow(0 16px 48px rgba(0, 0, 0, 0.3));
            padding-bottom: 20px;
        }

        /* ── BOTÓN PLAY ── */
        .play-btn {
            display: flex;
            justify-content: center;
            align-items: center;
            flex-shrink: 0;
            cursor: pointer;
            text-decoration: none;
            border: none;
            background: none;
        }

        .play-btn img {
            width: clamp(130px, 15vw, 220px); /* ← ligeramente más pequeño */
            object-fit: contain;
            transition: transform 0.1s ease, filter 0.1s ease;
        }

        .play-btn:hover img {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .play-btn:active img {
            transform: scale(0.96);
            filter: brightness(0.95);
        }
    </style>
</head>
<body>

    <!-- TÍTULO -->
    <div class="title">
        <img src="/assets/titles/plantagochi.png" alt="Plantagochi">
    </div>

    <!-- PLANTA CENTRAL -->
    <div class="plant-container">
        <img src="/assets/plants/planta_index.png" alt="Planta">
    </div>

    <!-- BOTÓN PLAY -->
    <a href="privacy_policy.html" class="play-btn">
        <img src="/assets/buttons/start_btn.png" alt="Jugar">
    </a>

</body>
</html>
