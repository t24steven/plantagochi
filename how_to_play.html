<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Plantagochi</title>
    <link rel="stylesheet" href="src/styles/style-base.css">
    <link rel="stylesheet" href="src/styles/style-menu.css">
    <style>


        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            font-family: 'Arial Rounded MT Bold', 'Arial', sans-serif;
            background-size: cover;
            background-position: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 30px 20px 50px;
        }

        /* ── PLANTA CENTRAL ── */
        .plant-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0;
        }

        .plant-container img {
            max-height: 75vh;
            max-width: 85vw;
            object-fit: contain;
            filter: drop-shadow(0 8px 16px rgba(0,0,0,0.25));
        }

        /* ── BOTÓN PLAY ── */
        .play-btn {
            max-height: 75vh;
            max-width: 85vw;
            width: clamp(130px, 15vw, 220px);
            object-fit: contain;
            transition: transform 0.1s ease, filter 0.1s ease;
        }

        .play-btn img{
            width: clamp(230px, 15vw, 220px); /* ← ligeramente más pequeño */
            object-fit: contain;
            transition: transform 0.1s ease, filter 0.1s ease;
        }

        .play-btn:hover img {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        .play-btn:active img {
            transform: scale(0.96);
            filter: brightness(0.95);
        }
    </style>
</head>
<body>
    <div class="plant-container">
        <img src="/assets/pp/how_to_play.png" alt="how to play">
    </div>

    <a href="selectYourPlant.html" class="play-btn">
        <img src="/assets/buttons/next_btn.png" alt="seleccionar planta">
    </a>

</body>
</html>
